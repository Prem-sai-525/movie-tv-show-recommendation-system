<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSphere | Premium Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --card: #0f121a; --text: #ffffff; --accent: #d4af37; 
            --sub-text: #94a3b8; --border: #1e293b; --scroll-thumb: #1e293b;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; }
        .container { max-width: 1100px; margin: auto; padding: 60px 20px; }
        
        /* Layout & Search Styling */
        header { margin-bottom: 50px; text-align: center; }
        .main-title { font-size: 3.5rem; font-weight: 700; margin: 0; letter-spacing: -1.5px; }
        .main-title span { color: var(--accent); font-weight: 300; }
        .search-section { display: flex; flex-direction: column; gap: 20px; margin-bottom: 60px; }
        .input-row-primary { position: relative; width: 100%; }
        .input-row-secondary {
            display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px;
            background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border);
        }
        input, select {
            width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); outline: none; font-family: inherit;
        }
        #movieInput { background: var(--card); font-size: 1.2rem; }
        .btn-recommend {
            background: var(--accent); color: #000; border: none; padding: 0 45px; height: 54px;
            margin-top: auto; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* --- RECTIFIED RESULTS GRID --- */
        .results-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        .movie-card {
            background: var(--card); border-radius: 24px; border: 1px solid var(--border);
            height: 200px; /* Base height */
            position: relative; overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        /* Hover Expansion */
        .movie-card:hover { 
            height: 400px; /* Expanded height for clear view */
            border-color: var(--accent); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card-header { padding: 25px 25px 15px 25px; flex-shrink: 0; }
        .imdb-badge { font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--accent); color: var(--accent); }
        .title { margin: 15px 0 5px 0; font-size: 1.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- RECTIFIED SUMMARY SECTION --- */
        .summary-body {
            padding: 0 25px 25px 25px;
            opacity: 0;
            overflow-y: auto; /* Enable scroll if text is too long */
            transition: opacity 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) transparent;
        }

        /* Webkit Scrollbar Styling (Chrome/Safari) */
        .summary-body::-webkit-scrollbar { width: 4px; }
        .summary-body::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }

        .movie-card:hover .summary-body {
            opacity: 1;
        }

        .summary-text {
            color: var(--sub-text);
            line-height: 1.6;
            font-size: 0.9rem;
            margin-top: 10px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        #suggestions {
            position: absolute; top: 105%; left: 0; right: 0; background: var(--card); 
            border: 1px solid var(--border); border-radius: 14px; z-index: 100; display: none;
        }
        .sug-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .sug-item:hover { color: var(--accent); background: #161b22; }

        /*base title style */
        .title { 
            margin: 15px 0 5px 0; 
            font-size: 1.4rem; 
            white-space: nowrap;      /* Keep it on one line initially */
            overflow: hidden; 
            text-overflow: ellipsis;  /* Show '...' when cut off */
            transition: all 0.3s ease; 
        }

        /*Update the hover state to show the full title */
        .movie-card:hover .title {
            white-space: normal;      /* Allow text to wrap to next line */
            overflow: visible; 
            text-overflow: clip;      /* Remove the '...' dots */
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="main-title">Omni<span>Sphere</span></h1>
        <p style="color: var(--sub-text); letter-spacing: 2px; text-transform: uppercase; font-size: 0.7rem;">Movie & TVshow Recommendation system</p>
    </header>

    <div class="search-section">
        <div class="input-row-primary">
            <input type="text" id="movieInput" placeholder="Enter the movie you have recently watched... " autocomplete="on">
            <div id="suggestions"></div>
        </div>
        <div class="input-row-secondary">
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:0.6rem; color:var(--accent); font-weight:700;">TYPE</label>
                <select id="typeInput"><option value="Both">Both</option><option value="Movie">Movie</option><option value="TV Show">TV Show</option></select>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:0.6rem; color:var(--accent); font-weight:700;">PLATFORM</label>
                <select id="ottInput">
                    <option value="All">All Platforms</option>
                    <option value="Netflix">Netflix</option>
                    <option value="HBO Max">HBO Max</option>
                    <option value="Amazon Prime">Amazon Prime</option>
                    <option value="Disney+">Disney+</option>
                    <option value="Apple TV">Apple TV</option>
                    <option value="Paramount+">Paramount+</option>
                </select>
            </div>
            <button class="btn-recommend" onclick="getRecs()">Recommend</button>
        </div>
    </div>
    <div id="results" class="results-grid"></div>
</div>

<script>
    // Suggestions logic
    const movieInput = document.getElementById('movieInput');
    const sugBox = document.getElementById('suggestions');

    movieInput.addEventListener('input', async (e) => {
        const val = e.target.value;
        if(val.length < 2) { sugBox.style.display = 'none'; return; }
        const res = await fetch('/autocomplete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({query: val}) });
        const matches = await res.json();
        if(matches.length > 0) {
            sugBox.innerHTML = matches.map(m => `<div class="sug-item">${m}</div>`).join('');
            sugBox.style.display = 'block';
        }
    });

    sugBox.addEventListener('click', (e) => {
        if(e.target.classList.contains('sug-item')) {
            movieInput.value = e.target.textContent;
            sugBox.style.display = 'none';
        }
    });

    // Recommendation logic
    async function getRecs() {
        const results = document.getElementById('results');
        results.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--accent);">SYNCHRONIZING...</p>';
        
        const res = await fetch('/recommend', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title: movieInput.value, ott: document.getElementById('ottInput').value, type: document.getElementById('typeInput').value })
        });
        const data = await res.json();
        
        results.innerHTML = data.map(m => `
            <div class="movie-card">
                <div class="card-header">
                    <span class="imdb-badge">IMDb ${m.Score}</span>
                    <h2 class="title">${m.Title}</h2>
                    <p style="color:var(--sub-text); font-size:0.8rem; margin:5px 0;">${m.Year} • ${m.Type}</p>
                    <p style="color:var(--accent); font-size:0.75rem; font-weight:700;">${m.OTT}</p>
                </div>
                <div class="summary-body">
                    <div class="summary-text">
                        <strong style="color:var(--text); font-size:0.7rem; display:block; margin-bottom:10px; letter-spacing:1px;">SUMMARY</strong>
                        ${m.Desc}
                    </div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
